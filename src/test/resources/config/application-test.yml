logging:
  config: classpath:logback.xml
spring:
  main:
    banner-mode: 'off'
    allow-bean-definition-overriding: true
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    hikari:
      maximum-pool-size: 2
    password: ''
    url: jdbc:tc:postgresql:18.1:///cyperux?TC_TMPFS=/testtmpfs:rw
    username: cyperux
  docker:
    compose:
      enabled: false
  liquibase:
    contexts: test
  security:
    oauth2:
      client:
        provider:
          oidc:
            issuer-uri: http://DO_NOT_CALL:9080/realms/cyperux
server:
  port: 0
